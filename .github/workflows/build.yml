name: Build and deploy kitagohan MAP

on:
  schedule:
    # 毎日 06:00 JST (= 21:00 UTC 前日) に実行
    - cron: "0 21 * * *"
  workflow_dispatch:  # 手動実行も可能

permissions:
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ジオコード結果を Actions キャッシュで永続化する。
      # main に commit し返さないので、リポジトリのブランチは一切汚れない。
      - name: Restore geocode cache
        uses: actions/cache@v4
        with:
          path: data/geocode_cache.json
          key: geocode-cache-${{ github.run_id }}
          restore-keys: |
            geocode-cache-

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Fetch Google Spreadsheet (kitagohan_stores)
        env:
          KITAGOHAN_SHEET_ID: ${{ secrets.KITAGOHAN_SHEET_ID }}
          KITAGOHAN_SHEET_GID: ${{ secrets.KITAGOHAN_SHEET_GID }}
        run: python3 scripts/fetch_sheet.py

      - name: Fetch Instagram posts
        env:
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_PAGE_TOKEN: ${{ secrets.INSTAGRAM_PAGE_TOKEN }}
        run: python3 scripts/fetch_posts.py

      - name: Build map HTML
        run: python3 scripts/build_map.py

      - name: Build preview HTML (filter test)
        run: python3 scripts/build_preview.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
